name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build with Buildozer Docker
      run: |
        docker run --rm \
          -v $(pwd):/home/user/app \
          -w /home/user/app \
          -e BUILDOZER_WARN_ON_ROOT=1 \
          kivy/buildozer:latest \
          --no-check-root android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: plc-timelock-apk
        path: bin/*.apk
        if-no-files-found: error
